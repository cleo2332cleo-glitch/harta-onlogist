name: Generare Harta Neon 2026

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Update la v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Update la v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install folium

      - name: Run script
        run: python harta.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # ASTA ERA PROBLEMA - acum e v4
        with:
          name: harta-interactiva
          path: harta_prologistics_2026.html
